<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ArenaPlus Jackpot Raffle</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <button class="sound-toggle" id="soundToggle" title="Toggle sound">🔊</button>

  <header class="header">
    <div>
      <span class="eyebrow">ArenaPlus Sportsbook</span>
      <span class="title">Jackpot Raffle</span>
    </div>
  </header>

  <!-- Admin controls -->
  <aside class="admin-panel" id="adminPanel">
    <h2>Draw Control</h2>

    <label class="field-label" for="fileInput">Entries CSV</label>
    <input type="file" id="fileInput" accept=".csv">

    <label class="field-label" for="winnerCount">Number of winners</label>
    <input type="number" id="winnerCount" placeholder="e.g. 1" min="1" value="1">

    <div class="upload-status" id="uploadStatus"></div>

    <button class="btn-primary" id="startBtn" onclick="startDraw()">Start Draw</button>
  </aside>

  <!-- Center stage -->
  <main class="stage">
    <div class="scoreboard">
      <span class="scoreboard-label">Shot Clock</span>
      <div id="shotClock">24</div>
    </div>

    <div class="court">
      <div class="ball" id="ball">
        <img src="/static/ball.png" alt="ArenaPlus">
      </div>
      <div class="ball-shadow"></div>
    </div>

    <div class="trophy" id="trophy">
      <img src="/static/trophy.png" alt="Trophy">
    </div>
    <div class="status-line" id="statusLine">Waiting for draw</div>
    <div class="reel" id="reel"></div>

    <div class="winners" id="winnerDisplay"></div>
  </main>

  <button class="download-btn" id="downloadBtn" onclick="downloadWinners()">Download Winners CSV</button>

  <div id="flash"></div>
  <canvas id="confetti"></canvas>

<script>
const els = {
  file:      document.getElementById("fileInput"),
  count:     document.getElementById("winnerCount"),
  status:    document.getElementById("uploadStatus"),
  admin:     document.getElementById("adminPanel"),
  start:     document.getElementById("startBtn"),
  clock:     document.getElementById("shotClock"),
  ball:      document.getElementById("ball"),
  trophy:    document.getElementById("trophy"),
  statusLine:document.getElementById("statusLine"),
  reel:      document.getElementById("reel"),
  winners:   document.getElementById("winnerDisplay"),
  download:  document.getElementById("downloadBtn"),
  flash:     document.getElementById("flash"),
  sound:     document.getElementById("soundToggle"),
};

let busy = false;
let loaded = false;       // has a CSV been uploaded this session?
let soundOn = true;
let audioCtx = null;

const sleep = (ms) => new Promise(r => setTimeout(r, ms));

/* ---------------- sound (synthesized, no audio files needed) ------------- */
function ensureAudio() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) audioCtx = new AC();
  }
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
}
function tone(freq, dur, type = "square", vol = 0.2) {
  if (!soundOn || !audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}
const tick   = () => tone(880, 0.08, "square", 0.15);
const buzzer = () => { tone(170, 1.1, "sawtooth", 0.28); tone(172, 1.1, "square", 0.12); };

els.sound.addEventListener("click", () => {
  soundOn = !soundOn;
  els.sound.textContent = soundOn ? "🔊" : "🔇";
});

/* ---------------- upload ------------------------------------------------- */
els.file.addEventListener("change", uploadCsv);

async function uploadCsv() {
  if (!els.file.files.length) return;
  setStatus("Loading entries…");
  const form = new FormData();
  form.append("file", els.file.files[0]);

  const res = await fetch("/upload", { method: "POST", body: form });
  const data = await res.json();
  if (!res.ok) {
    setStatus(data.detail || "Upload failed", true);
    loaded = false;
    throw new Error(data.detail || "Upload failed");
  }
  loaded = true;
  setStatus(`✓ ${fmt(data.players)} accounts · ${fmt(data.tickets)} tickets loaded`);
}

function setStatus(msg, isError = false) {
  els.status.textContent = msg;
  els.status.classList.toggle("error", isError);
}
const fmt = (n) => Number(n).toLocaleString();

/* ---------------- the draw flow ------------------------------------------ */
async function startDraw() {
  if (busy) return;
  busy = true;
  els.start.disabled = true;
  ensureAudio();

  try {
    if (!loaded) await uploadCsv();   // upload now if the operator skipped it

    resetStage();
    els.admin.classList.add("hidden");

    const count = Math.max(1, Number(els.count.value) || 1);
    els.statusLine.textContent = "Loading the drum…";

    // winners are decided server-side instantly; animation is just showmanship
    const winRes = await fetch(`/draw-multiple?count=${count}`);
    const winners = await winRes.json();
    if (!winRes.ok || !Array.isArray(winners)) {
      throw new Error((winners && winners.detail) || "Could not draw winners");
    }

    // grab some real names so the shuffle reel looks authentic
    let decoys = [];
    try {
      const s = await fetch("/sample-names?count=80");
      decoys = await s.json();
    } catch (_) {}
    if (!decoys.length) decoys = winners.map(w => w.account);

    runReel(decoys);
    els.statusLine.textContent = "Drawing winner" + (count > 1 ? "s" : "");

    // 5-second shot-clock countdown
    for (let s = 5; s >= 1; s--) {
      els.clock.textContent = s;
      els.clock.classList.toggle("urgent", s <= 3);
      tick();
      await sleep(1000);
    }

    // BUZZER
    els.clock.textContent = "0";
    buzzer();
    els.flash.classList.add("fire");
    setTimeout(() => els.flash.classList.remove("fire"), 600);

    stopReel();
    els.statusLine.textContent = "";
    els.ball.style.display = "none";
    els.trophy.classList.add("show");
    confettiBurst();

    await sleep(250);
    reveal(winners);
    els.download.classList.add("show");

  } catch (err) {
    els.statusLine.textContent = err.message;
    setStatus(err.message, true);
    console.error(err);
  } finally {
    busy = false;
    els.start.disabled = false;
    els.admin.classList.remove("hidden");
  }
}

function resetStage() {
  els.winners.innerHTML = "";
  els.download.classList.remove("show");
  els.trophy.classList.remove("show");
  els.ball.style.display = "";
  els.clock.classList.remove("urgent");
  els.clock.textContent = "5";
  els.statusLine.textContent = "";
}

/* ---------------- shuffle reel ------------------------------------------- */
let reelTimer = null;
function runReel(names) {
  els.reel.classList.add("live");
  reelTimer = setInterval(() => {
    const name = names[Math.floor(Math.random() * names.length)] || "------";
    els.reel.textContent = name;
  }, 60);
}
function stopReel() {
  clearInterval(reelTimer);
  els.reel.classList.remove("live");
  els.reel.textContent = "";
}

/* ---------------- winner reveal ------------------------------------------ */
function reveal(winners) {

  const grandWinner = winners[0];
  const megaWinners = winners.slice(1, 11);

  els.winners.innerHTML = `
    <div class="winners-heading">
      WINNERS
    </div>

    <div class="grand-title">
      GRAND JACKPOT WINNER
    </div>

    <div class="grand-card">

      <div class="grand-rank">
        1
      </div>

      <div class="grand-info">
        <div class="grand-account">
          ${escapeHtml(grandWinner.account)}
        </div>

        <div class="grand-prize">
          P685,824.25
        </div>
      </div>

      <div class="grand-tickets">
        ${fmt(grandWinner.tickets)} tickets
      </div>

    </div>

    <div class="mega-title">
      MEGA PRIZE WINNERS
    </div>

    <div class="mega-grid">

      ${megaWinners.map((w, i) => `
        <div class="mega-card">

          <div class="mega-rank">
            ${i + 2}
          </div>

          <div class="mega-info">

            <div class="mega-account">
              ${escapeHtml(w.account)}
            </div>

            <div class="mega-prize">
              P137,164.85
            </div>

            <div class="mega-tickets">
              ${fmt(w.tickets)} tickets
            </div>

          </div>

        </div>
      `).join("")}

    </div>

    <div class="announcement-box">
      📢 For the rest of raffle winners, kindly check our announcement and check your bonus wallet.
    </div>
  `;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

/* ---------------- confetti (self-contained, no library) ------------------ */
const cvs = document.getElementById("confetti");
const ctx = cvs.getContext("2d");
let parts = [], confettiRaf = null;
const COLORS = ["#ff6b00", "#ff9233", "#ffce4a", "#ffffff", "#e8a317"];

function sizeCanvas() { cvs.width = innerWidth; cvs.height = innerHeight; }
sizeCanvas();
addEventListener("resize", sizeCanvas);

function confettiBurst(n = 240) {
  for (let i = 0; i < n; i++) {
    parts.push({
      x: innerWidth / 2 + (Math.random() - 0.5) * innerWidth * 0.6,
      y: innerHeight * 0.25 + (Math.random() - 0.5) * 80,
      vx: (Math.random() - 0.5) * 12,
      vy: Math.random() * -9 - 4,
      g: 0.22 + Math.random() * 0.1,
      size: 5 + Math.random() * 7,
      rot: Math.random() * Math.PI,
      vr: (Math.random() - 0.5) * 0.3,
      color: COLORS[(Math.random() * COLORS.length) | 0],
    });
  }
  if (!confettiRaf) loopConfetti();
}

function loopConfetti() {
  ctx.clearRect(0, 0, cvs.width, cvs.height);
  parts = parts.filter(p => p.y < cvs.height + 40);
  for (const p of parts) {
    p.vy += p.g; p.x += p.vx; p.y += p.vy; p.vx *= 0.99; p.rot += p.vr;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
    ctx.restore();
  }
  confettiRaf = parts.length ? requestAnimationFrame(loopConfetti)
                             : (ctx.clearRect(0, 0, cvs.width, cvs.height), null);
}

/* ---------------- download ----------------------------------------------- */
function downloadWinners() { window.location.href = "/download-winners"; }
</script>
</body>
</html>
